<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>きのこたけのこ大戦争</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #ffffff;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  font-family: 'Hiragino Kaku Gothic Pro', 'メイリオ', sans-serif;
  cursor: crosshair;
  user-select: none;
}

/* 背景 */
#bg {
  position: fixed; inset: 0;
  background: #ffffff;
}
#bg-stars {
  position: fixed; inset: 0;
  background-image: none;
}

/* HUD */
#hud {
  position: fixed;
  top: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 32px;
  background: rgba(240,240,240,0.9);
  border-bottom: 2px solid;
  z-index: 100;
  gap: 16px;
}
#hud.kinoko-hud { border-color: #ff6b9d; }
#hud.takenoko-hud { border-color: #7ec850; }

.hud-block { text-align: center; min-width: 120px; }
.hud-label { font-size: 11px; letter-spacing: 3px; color: rgba(0,0,0,0.5); margin-bottom: 2px; }
.hud-value { font-size: 30px; font-weight: bold; }
#hud.kinoko-hud .hud-value { color: #ff6b9d; text-shadow: 0 0 20px rgba(255,107,157,0.8); }
#hud.takenoko-hud .hud-value { color: #7ec850; text-shadow: 0 0 20px rgba(126,200,80,0.8); }

#title-hud { font-size: 18px; font-weight: bold; letter-spacing: 4px; color: #333; text-align: center; }

/* ゲームエリア */
#game-area {
  position: fixed;
  top: 70px; left: 0; right: 0; bottom: 6px;
}

/* タイマーバー */
#timer-bar {
  position: fixed;
  bottom: 0; left: 0;
  height: 6px;
  transition: width 0.3s linear;
}
.kinoko-bar { background: linear-gradient(90deg, #ff6b9d, #ffb347); box-shadow: 0 0 10px rgba(255,107,157,0.8); }
.takenoko-bar { background: linear-gradient(90deg, #7ec850, #c8e63c); box-shadow: 0 0 10px rgba(126,200,80,0.8); }

/* 敵キャラ */
.enemy {
  position: absolute;
  transform: translate(-50%, -50%);
  cursor: pointer;
  animation: enemy-appear 0.3s ease-out;
  transition: transform 0.05s;
}
.enemy:active { transform: translate(-50%, -50%) scale(0.85); }
.enemy img { display: block; pointer-events: none; }

@keyframes enemy-appear {
  from { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  to   { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}

/* 爆発エフェクト */
.explosion {
  position: absolute;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 300;
  animation: explosion-anim 0.6s ease-out forwards;
}
@keyframes explosion-anim {
  0%   { transform: translate(-50%, -50%) scale(0.2); opacity: 1; }
  40%  { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
}

/* スコアポップ */
.score-pop {
  position: absolute;
  pointer-events: none;
  transform: translateX(-50%);
  font-size: 32px;
  font-weight: bold;
  color: #ffdd00;
  text-shadow: 0 0 10px rgba(255,200,0,0.9), 0 2px 4px rgba(0,0,0,0.8);
  animation: score-rise 1s ease-out forwards;
  z-index: 400;
  white-space: nowrap;
}
@keyframes score-rise {
  0%   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  20%  { transform: translateX(-50%) translateY(-10px) scale(1.3); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-90px) scale(0.8); }
}

/* コンボ表示 */
#combo-display {
  position: fixed;
  right: 32px; bottom: 30px;
  font-size: 22px; font-weight: bold;
  color: #ff6644;
  text-shadow: 0 0 12px rgba(255,100,50,0.9);
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 100;
  letter-spacing: 2px;
}

/* 選択画面 */
#select-screen {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #1a0a2e 0%, #0d1a0a 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 500;
  gap: 30px;
}

.select-title {
  font-size: 48px;
  font-weight: bold;
  letter-spacing: 6px;
  color: #fff;
  text-shadow: 0 0 40px rgba(255,255,255,0.5);
  text-align: center;
  line-height: 1.2;
}
.select-sub {
  font-size: 18px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 4px;
}

.faction-select {
  display: flex;
  gap: 60px;
  margin-top: 10px;
}

.faction-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 30px 40px;
  border: 3px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.3s;
  background: rgba(255,255,255,0.03);
  position: relative;
  overflow: hidden;
  min-width: 220px;
}
.faction-card::before {
  content: '';
  position: absolute; inset: 0;
  opacity: 0;
  transition: opacity 0.3s;
}
.faction-card.kinoko::before { background: radial-gradient(ellipse at 50% 50%, rgba(255,107,157,0.15), transparent 70%); }
.faction-card.takenoko::before { background: radial-gradient(ellipse at 50% 50%, rgba(126,200,80,0.15), transparent 70%); }
.faction-card:hover::before { opacity: 1; }
.faction-card.kinoko:hover { border-color: #ff6b9d; transform: scale(1.05) translateY(-4px); box-shadow: 0 20px 60px rgba(255,107,157,0.4); }
.faction-card.takenoko:hover { border-color: #7ec850; transform: scale(1.05) translateY(-4px); box-shadow: 0 20px 60px rgba(126,200,80,0.4); }

.faction-img { width: 150px; height: 150px; object-fit: contain; }
.faction-name { font-size: 28px; font-weight: bold; letter-spacing: 4px; }
.faction-card.kinoko .faction-name { color: #ff6b9d; text-shadow: 0 0 20px rgba(255,107,157,0.8); }
.faction-card.takenoko .faction-name { color: #7ec850; text-shadow: 0 0 20px rgba(126,200,80,0.8); }
.faction-desc { font-size: 13px; color: rgba(255,255,255,0.5); text-align: center; letter-spacing: 1px; line-height: 1.6; }

.vs-badge {
  font-size: 40px;
  font-weight: bold;
  color: rgba(255,255,255,0.3);
  align-self: center;
  letter-spacing: 2px;
}

/* エンドスクリーン */
#end-screen {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #1a0a2e 0%, #0d1a0a 100%);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 500;
  gap: 20px;
}
.end-title { font-size: 56px; font-weight: bold; letter-spacing: 8px; color: #fff; }
.end-sub { font-size: 16px; color: rgba(255,255,255,0.5); letter-spacing: 4px; }
#final-score { font-size: 80px; font-weight: bold; color: #ffdd00; text-shadow: 0 0 40px rgba(255,200,0,0.9); }
#kill-count { font-size: 22px; color: rgba(255,255,255,0.7); letter-spacing: 3px; }
#rank-display { font-size: 28px; letter-spacing: 4px; margin-top: 4px; }

.retry-btn {
  margin-top: 16px;
  padding: 18px 60px;
  font-size: 22px;
  font-family: inherit;
  letter-spacing: 4px;
  background: transparent;
  color: #fff;
  border: 2px solid rgba(255,255,255,0.4);
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 8px;
}
.retry-btn:hover { background: rgba(255,255,255,0.1); border-color: #fff; transform: scale(1.04); }

/* 体力バー */
.hp-bar-wrap {
  display: none;
  position: absolute;
  bottom: -12px;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  height: 5px;
  background: rgba(0,0,0,0.5);
  border-radius: 3px;
  overflow: hidden;
}
.hp-bar {
  height: 100%;
  background: #44ff88;
  border-radius: 3px;
  transition: width 0.1s;
}

/* フルスクリーンボタン */
#fullscreen-btn {
  position: fixed;
  bottom: 4px;
  right: 6px;
  z-index: 1000;
  background: transparent;
  color: rgba(255,255,255,0.25);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  padding: 2px 6px;
  font-size: 11px;
  cursor: pointer;
  transition: opacity 0.2s;
  pointer-events: none;
  opacity: 0;
}
#fullscreen-btn.visible {
  pointer-events: auto;
  opacity: 1;
}

/* カウントダウン */
#countdown {
  position: fixed; inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 600;
  background: rgba(0,0,0,0.5);
}
#countdown-num {
  font-size: 200px;
  font-weight: bold;
  color: #fff;
  text-shadow: 0 0 60px rgba(255,255,255,0.8);
  animation: count-pulse 0.8s ease-out;
}
@keyframes count-pulse {
  from { transform: scale(1.5); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
</style>
</head>

let playerFaction = null; // 'kinoko' or 'takenoko'
let enemyImg = null;

let killCount = 0;

let comboTimer = null;

const gameArea = document.getElementById('game-area');

// きのこ軍を選んだ → 敵はたけのこ(1.png)
// たけのこ軍を選んだ → 敵はきのこ(2.png)
function selectFaction(faction) {
  playerFaction = faction;
  document.getElementById('select-screen').style.display = 'none';
  
  if (faction === 'kinoko') {
    enemyImg = IMG1_B64; // たけのこが敵
    hud.className = 'kinoko-hud';
    timerBar.className = 'kinoko-bar';
    document.getElementById('title-hud').textContent = 'VS きのこ軍 🍄';
  } else {
    enemyImg = IMG2_B64; // きのこが敵
    hud.className = 'takenoko-hud';
    timerBar.className = 'takenoko-bar';
    document.getElementById('title-hud').textContent = 'VS たけのこ軍 🎋 ';
  }

  startCountdown();
}

function startCountdown() {
  const cdEl = document.getElementById('countdown');
  const numEl = document.getElementById('countdown-num');
  cdEl.style.display = 'flex';
  let cnt = 3;
  numEl.textContent = cnt;
  numEl.style.animation = 'none';
  void numEl.offsetWidth;
  numEl.style.animation = 'count-pulse 0.8s ease-out';

  const iv = setInterval(() => {
    cnt--;
    if (cnt <= 0) {
      clearInterval(iv);
      numEl.textContent = 'GO!';
      numEl.style.animation = 'none';
      void numEl.offsetWidth;
      numEl.style.animation = 'count-pulse 0.8s ease-out';
      setTimeout(() => {
        cdEl.style.display = 'none';
        startGame();
      }, 700);
    } else {
      numEl.textContent = cnt;
      numEl.style.animation = 'none';
      void numEl.offsetWidth;
      numEl.style.animation = 'count-pulse 0.8s ease-out';
    }
  }, 1000);
}

function startGame() {
  score = 0;
  killCount = 0;
  combo = 0;
  timeLeft = 30;
  gameRunning = true;
  enemies = [];
  gameArea.innerHTML = '';
  updateScore();
  updateTimer();

  // 最初に5体スポーン
  for (let i = 0; i < 5; i++) {
    setTimeout(() => spawnEnemy(), i * 250);
  }

  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimer();
    if (timeLeft <= 0) endGame();
  }, 1000);
}

function updateScore() {
  scoreDisplay.textContent = score.toLocaleString();
}

function updateTimer() {
  timerDisplay.textContent = timeLeft;
  const pct = (timeLeft / 30) * 100;
  timerBar.style.width = pct + '%';
}

function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function randFloat(a, b) { return Math.random() * (b - a) + a; }

function spawnEnemy() {
  if (!gameRunning) return;

  // サイズをランダムに（大・中・小）
  const sizeRoll = Math.random();
  let size, hp, basePoints, speed;
  if (sizeRoll < 0.2) {
    // ボス大
    size = randInt(110, 140); hp = 1; basePoints = 300; speed = 0.5;
  } else if (sizeRoll < 0.55) {
    // 通常
    size = randInt(70, 100); hp = 1; basePoints = 150; speed = randFloat(0.7, 1.5);
  } else {
    // 小
    size = randInt(45, 65); hp = 1; basePoints = 100; speed = randFloat(1.5, 2.5);
  }

  const areaW = window.innerWidth;
  const areaH = window.innerHeight - 70;
  const x = randInt(size, areaW - size);
  const y = randInt(size + 70, areaH - size + 70);

  const el = document.createElement('div');
  el.className = 'enemy';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.width = size + 'px';
  el.style.height = size + 'px';

  const img = document.createElement('img');
  img.src = enemyImg;
  img.style.width = size + 'px';
  img.style.height = size + 'px';
  img.style.objectFit = 'contain';
  img.style.pointerEvents = 'none';
  el.appendChild(img);

  // HP バー
  const hpWrap = document.createElement('div');
  hpWrap.className = 'hp-bar-wrap';
  const hpBar = document.createElement('div');
  hpBar.className = 'hp-bar';
  hpBar.style.width = '100%';
  hpWrap.appendChild(hpBar);
  el.appendChild(hpWrap);

  let vx = randFloat(-speed, speed);
  let vy = randFloat(-speed, speed);
  if (Math.abs(vx) < 0.3) vx = 0.3 * Math.sign(vx) || 0.3;
  if (Math.abs(vy) < 0.3) vy = 0.3 * Math.sign(vy) || 0.3;

  const tid = { el, hpBar, x, y, vx, vy, size, hp, maxHp: hp, basePoints, alive: true };
  enemies.push(tid);
  gameArea.appendChild(el);

  function onHit(clientX, clientY) {
    if (!tid.alive) return;
    tid.hp--;
    const pct = (tid.hp / tid.maxHp) * 100;
    tid.hpBar.style.width = pct + '%';
    if (tid.hp <= 0) {
      tid.alive = false;
      killEnemy(tid, clientX, clientY);
    } else {
      // ダメージフラッシュ
      img.style.filter = 'brightness(3) saturate(0)';
      setTimeout(() => { img.style.filter = ''; }, 100);
      showScorePop(clientX, clientY - 70, '💥 Hit!', '#ff8888');
    }
  }

  el.addEventListener('click', e => { onHit(e.clientX, e.clientY); e.stopPropagation(); });
  el.addEventListener('touchstart', e => {
    const t = e.touches[0];
    onHit(t.clientX, t.clientY);
    e.preventDefault();
    e.stopPropagation();
  }, { passive: false });

  animateEnemy(tid);
}

function killEnemy(tid, px, py) {
  clearTimeout(tid.removeTimer);
  tid.el.remove();

  // コンボ
  combo++;
  clearTimeout(comboTimer);
  comboTimer = setTimeout(() => { combo = 0; comboDisplay.style.opacity = 0; }, 1800);

  let pts = tid.basePoints;
  let label = '+' + pts;
  if (combo >= 7) {
    pts = Math.floor(pts * 4);
    label = '🔥 FEVER x' + combo + '  +' + pts;
    comboDisplay.textContent = '🔥 FEVER x' + combo;
    comboDisplay.style.opacity = 1;
  } else if (combo >= 4) {
    pts = Math.floor(pts * 2.5);
    label = '⚡ COMBO x' + combo + '  +' + pts;
    comboDisplay.textContent = '⚡ COMBO x' + combo;
    comboDisplay.style.opacity = 1;
  } else if (combo >= 2) {
    pts = Math.floor(pts * 1.5);
    label = '✨ x' + combo + '  +' + pts;
  }

  score += pts;
  killCount++;
  updateScore();

  showExplosion(px, py - 70);
  showScorePop(px, py - 70, label, '#ffdd00');

  setTimeout(() => spawnEnemy(), 400);
}

function animateEnemy(tid) {
  if (!gameRunning || !tid.alive) return;
  const r = tid.size / 2;
  const maxX = window.innerWidth - r;
  const maxY = window.innerHeight - r;
  const minX = r;
  const minY = 70 + r;

  tid.x += tid.vx;
  tid.y += tid.vy;

  if (tid.x < minX) { tid.x = minX; tid.vx = Math.abs(tid.vx); }
  if (tid.x > maxX) { tid.x = maxX; tid.vx = -Math.abs(tid.vx); }
  if (tid.y < minY) { tid.y = minY; tid.vy = Math.abs(tid.vy); }
  if (tid.y > maxY) { tid.y = maxY; tid.vy = -Math.abs(tid.vy); }

  tid.el.style.left = tid.x + 'px';
  tid.el.style.top  = tid.y + 'px';

  requestAnimationFrame(() => animateEnemy(tid));
}

// 爆発エフェクト
function showExplosion(x, y) {
  // 粒子を複数飛ばす
  const colors = ['#ff4400','#ff8800','#ffcc00','#ff6600','#ffffff','#ff2200'];
  const particleCount = 16;
  
  for (let i = 0; i < particleCount; i++) {
    const p = document.createElement('div');
    p.style.cssText = `
      position:absolute;
      left:${x}px; top:${y}px;
      width:${randInt(6,14)}px; height:${randInt(6,14)}px;
      border-radius:50%;
      background:${colors[i % colors.length]};
      pointer-events:none;
      z-index:300;
    `;
    const angle = (i / particleCount) * Math.PI * 2;
    const dist = randInt(40, 100);
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    gameArea.appendChild(p);
    
    p.animate([
      { transform: 'translate(-50%,-50%) scale(1)', opacity: 1 },
      { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(0.1)`, opacity: 0 }
    ], { duration: randInt(400, 700), easing: 'ease-out', fill: 'forwards' })
    .onfinish = () => p.remove();
  }

  // 中心の閃光
  const flash = document.createElement('div');
  flash.className = 'explosion';
  flash.style.left = x + 'px';
  flash.style.top = y + 'px';
  flash.innerHTML = `<svg width="120" height="120" viewBox="0 0 120 120">
    <circle cx="60" cy="60" r="55" fill="none" stroke="#ff8800" stroke-width="4" opacity="0.9"/>
    <circle cx="60" cy="60" r="35" fill="rgba(255,150,0,0.5)"/>
    <circle cx="60" cy="60" r="15" fill="#ffff88"/>
    <line x1="60" y1="5"  x2="60" y2="30"  stroke="#ff8800" stroke-width="3" opacity="0.8"/>
    <line x1="60" y1="90" x2="60" y2="115" stroke="#ff8800" stroke-width="3" opacity="0.8"/>
    <line x1="5"  y1="60" x2="30" y2="60"  stroke="#ff8800" stroke-width="3" opacity="0.8"/>
    <line x1="90" y1="60" x2="115" y2="60" stroke="#ff8800" stroke-width="3" opacity="0.8"/>
    <line x1="20" y1="20" x2="38" y2="38"  stroke="#ffcc00" stroke-width="2" opacity="0.7"/>
    <line x1="100" y1="20" x2="82" y2="38" stroke="#ffcc00" stroke-width="2" opacity="0.7"/>
    <line x1="20" y1="100" x2="38" y2="82" stroke="#ffcc00" stroke-width="2" opacity="0.7"/>
    <line x1="100" y1="100" x2="82" y2="82" stroke="#ffcc00" stroke-width="2" opacity="0.7"/>
  </svg>`;
  gameArea.appendChild(flash);
  setTimeout(() => flash.remove(), 600);
}

function showScorePop(x, y, text, color) {
  const el = document.createElement('div');
  el.className = 'score-pop';
  el.style.left = x + 'px';
  el.style.top = (y) + 'px';
  el.style.color = color || '#ffdd00';
  el.textContent = text;
  gameArea.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function showSelect() {
  document.getElementById('end-screen').style.display = 'none';
  document.getElementById('select-screen').style.display = 'flex';
}

function endGame() {
  gameRunning = false;
  clearInterval(timerInterval);
  enemies.forEach(e => { e.alive = false; if(e.el.parentNode) e.el.remove(); });
  enemies = [];
  gameArea.innerHTML = '';

  let rank, rankColor;
  if (killCount >= 50)      { rank = '👑 LEGENDARY WARRIOR'; rankColor = '#ffdd00'; }
  else if (killCount >= 35) { rank = '🏆 MASTER FIGHTER'; rankColor = '#ff8800'; }
  else if (killCount >= 22) { rank = '🥇 GREAT SOLDIER'; rankColor = '#88ccff'; }
  else if (killCount >= 12) { rank = '🥈 BRAVE FIGHTER'; rankColor = '#aaffaa'; }
  else                      { rank = '🥉 YOUNG WARRIOR'; rankColor = '#cccccc'; }

  const faction = playerFaction === 'kinoko' ? '🍄 きのこ軍' : '🎋 たけのこ軍';
  document.getElementById('end-title').textContent = faction + ' ⚔️ 結果';
  document.getElementById('final-score').textContent = score.toLocaleString();
  document.getElementById('kill-count').textContent = '敵撃破: ' + killCount + '体';
  document.getElementById('rank-display').textContent = rank;
  document.getElementById('rank-display').style.color = rankColor;
  document.getElementById('end-screen').style.display = 'flex';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && gameRunning) endGame();
  if (e.key === 'F11') document.documentElement.requestFullscreen?.();
});

fsBtn.id = 'fullscreen-btn';
fsBtn.textContent = '全画面';
fsBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
});
document.addEventListener('fullscreenchange', () => {
  fsBtn.textContent = document.fullscreenElement ? '全画面解除' : '全画面';
});
document.body.appendChild(fsBtn);

function setFsBtnVisible(v) {
  fsBtn.classList.toggle('visible', v);
}

// 選択画面・結果画面でのみ表示、ゲーム中は非表示
const _origShowSelect = showSelect;
showSelect = function() { _origShowSelect(); setFsBtnVisible(true); };
const _origEndGame = endGame;
endGame = function() { _origEndGame(); setFsBtnVisible(true); };
const _origStartGame = startGame;
startGame = function(f) { setFsBtnVisible(false); _origStartGame(f); };

// 初期（選択画面）
setFsBtnVisible(true);
</script>
</body>
</html>
